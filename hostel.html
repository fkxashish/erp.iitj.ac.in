<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP System (Beta), IITJ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="erp-page">

  <!-- ===== TOP NAVBAR ===== -->
  <nav class="erp-navbar">
    <div class="erp-navbar-left">
      <span class="erp-brand">ERP System (Beta), IITJ</span>
      <a href="dashboard.html" class="erp-nav-link">
        <i class="bi bi-house-fill"></i> Home
      </a>
    </div>
    <div class="erp-navbar-right">
      <span class="erp-welcome">Welcome Garima (B25BS1100)</span>
      <a href="index.html" class="erp-nav-link erp-logout">
        <i class="bi bi-box-arrow-right"></i> Logout
      </a>
    </div>
  </nav>

  <!-- ===== SUB-HEADER ===== -->
  <div class="erp-subheader">
    <div class="erp-subheader-left">
      <i class="bi bi-building"></i>
      <a href="hostel.html" class="erp-module-link ms-1">Hostel</a>
    </div>
    <div class="erp-subheader-right">
      <input type="text" class="erp-search" id="searchMenu" placeholder="Search Menu" />
    </div>
  </div>

  <!-- ===== BREADCRUMB ===== -->
  <div class="erp-breadcrumb">
    You are in: <a href="hostel.html">Hostel</a>
  </div>

  <!-- ===== ACCORDION MENU ===== -->
  <div class="erp-content erp-accordion-page">

    <!-- 1. Hostel Room Booking -->
    <div class="erp-accordion-item" id="acc-booking">
      <div class="erp-accordion-header" onclick="erpToggle('body-booking', this)">
        <span class="erp-accordion-toggle">+</span>
        <a href="#" class="erp-acc-link">Hostel Room Booking</a>
      </div>
      <div class="erp-accordion-body" id="body-booking">
        <div class="erp-subitem-row">
          <a href="hostel_booking.html" class="erp-subitem-link">Hostel Room Booking</a>
          <i class="bi bi-info-circle-fill erp-info-icon" title="Hostel Room Booking"></i>
        </div>
      </div>
    </div>

    <!-- 2. Mess Bill -->
    <div class="erp-accordion-item" id="acc-mess">
      <div class="erp-accordion-header" onclick="erpToggle('body-mess', this)">
        <span class="erp-accordion-toggle">+</span>
        <a href="#" class="erp-acc-link">Mess Bill</a>
      </div>
      <div class="erp-accordion-body" id="body-mess">
        <div class="erp-subitem-row">
          <a href="mess_bill.html" class="erp-subitem-link">Mess Bill</a>
          <i class="bi bi-info-circle-fill erp-info-icon" title="Mess Bill"></i>
        </div>
      </div>
    </div>

  </div><!-- /erp-content -->

  <!-- ===== FOOTER ===== -->
  <footer class="erp-footer">
    Copyright &copy; ERP System, IIT Jodhpur, Helpline - (0291)2801176
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
